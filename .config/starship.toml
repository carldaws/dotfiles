format = """
[вЦСвЦТвЦУ](white)\
[ оЬС ](bg:white fg:black)\
[оВі](bg:bright-black fg:white)\
$directory\
[оВі](fg:bright-black bg:black)\
$git_branch\
$git_status\
[оВі](fg:black bg:black)\
$golang\
$lua\
$nodejs\
$ruby\
[оВі](fg:black bg:black)\
$time\
[оВі ](fg:black)\
\n$character"""

[directory]
style = "fg:bright-white bg:bright-black"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вА¶/"

[directory.substitutions]
"Code" = "оЧї"
"Documents" = "у∞ИЩ "
"Downloads" = "пАЩ "
"Music" = "пАБ "
"Pictures" = "пАЊ "

[git_branch]
symbol = "пРШ"
style = "bg:black"
format = '[[ $symbol $branch ](fg:green bg:black)]($style)'

[git_status]
style = "bg:black"
format = '[[($all_status$ahead_behind )](fg:green bg:black)]($style)'

[golang]
symbol = "оШІ"
style = "bg:black"
format = '[[ $symbol ($version) ](fg:cyan bg:black)]($style)'

[lua]
symbol = "оШ†"
style = "bg:black"
format = '[[ $symbol ($version) ](fg:cyan bg:black)]($style)'

[nodejs]
symbol = "оЬШ"
style = "bg:black"
format = '[[ $symbol ($version) ](fg:cyan bg:black)]($style)'

[ruby]
symbol = "оЬє"
style = "bg:black"
format = '[[ $symbol ($version) ](fg:cyan bg:black)]($style)'

[time]
disabled = false
time_format = "%R"
style = "bg:bright-black"
format = '[[ пРЇ $time ](fg:purple bg:black)]($style)'
